<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arthur Veloso | Student ID - 77933</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f5f5;
}

form{
background:white;
padding:30px;
border-radius:10px;
width:320px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:5px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
}

.error{
color:red;
font-size:14px;
display:none;
}

.success{
text-align:center;
font-size:20px;
color:green;
display:none;
}

</style>

</head>

<body>

<form id="loginForm">

<h2>Student Login</h2>

<label>First Name</label>
<input type="text" id="firstName">
<p class="error" id="firstNameError">First name is required</p>

<label>Last Name</label>
<input type="text" id="lastName">
<p class="error" id="lastNameError">Last name is required</p>

<label>Email</label>
<input type="email" id="email">
<p class="error" id="emailError">Enter a valid email</p>

<label>Password</label>
<input type="password" id="password">
<p class="error" id="passwordError">Password must be at least 6 characters</p>

<label>Student ID</label>
<input type="text" id="studentId">
<p class="error" id="studentIdError">Student ID is required</p>

<button type="submit">Login</button>

</form>

<div class="success" id="successMessage">
Login successful ✅
</div>

</body>
</html>
